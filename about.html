<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Us | Sitara Family Restaurant</title>
  <meta name="description" content="Discover the story behind Sitara Family Restaurant — a multi-cuisine fine-dining restaurant in Bidar, Karnataka serving North Indian, South Indian, Chinese and Continental food." />
  <meta name="keywords" content="Sitara Family Restaurant Bidar, multi-cuisine restaurant story, restaurant about us Bidar" />
  <link rel="canonical" href="about.html" />
  <link rel="icon" href="https://picsum.photos/seed/sitaralogo/64/64" type="image/png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#fdf6ea', 'cream-panel': '#fbeedb', maroon: '#5c1a1b', 'maroon-soft': '#7a2b28',
            terracotta: '#c1502e', 'terracotta-deep': '#a23f23', gold: '#d4a24c', ink: '#2b1b12', 'ink-soft': '#5a463a',
          },
          fontFamily: {
            display: ['Fraunces', 'serif'], body: ['Work Sans', 'sans-serif'], mono: ['DM Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-cream text-ink font-body antialiased">

  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:bg-terracotta focus:text-cream focus:px-4 focus:py-2 focus:rounded-full z-[100]">Skip to main content</a>

  <header id="site-header"></header>

  <main id="main-content">

    <!-- ============================ PAGE HERO ============================ -->
    <section class="relative h-[58vh] min-h-[420px] w-full overflow-hidden flex items-center justify-center text-center" aria-label="About page hero">
      <img id="page-hero-bg" src="" alt="Interior of Sitara Family Restaurant dining room" class="absolute inset-0 w-full h-full object-cover img-skeleton" />
      <div class="absolute inset-0 bg-gradient-to-b from-ink/75 via-ink/55 to-cream"></div>
      <div class="relative z-10 px-6">
        <p class="font-mono-label text-xs uppercase text-terracotta mb-4 reveal">Our Story</p>
        <h1 id="page-title" class="font-display text-cream text-4xl sm:text-6xl mb-4 reveal reveal-delay-1"></h1>
        <p id="page-subtitle" class="text-cream/85 max-w-lg mx-auto reveal reveal-delay-2"></p>
      </div>
    </section>

    <!-- ============================ STORY ============================ -->
    <section class="py-24 px-5 sm:px-8" aria-labelledby="story-heading">
      <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-14 items-center">
        <div class="reveal rounded-2xl overflow-hidden aspect-[4/5]">
          <img id="story-image" src="" alt="A founding moment at the restaurant" class="w-full h-full object-cover img-skeleton" />
        </div>
        <div class="reveal reveal-delay-1">
          <p id="story-eyebrow" class="font-mono-label text-xs uppercase text-terracotta mb-4"></p>
          <h2 id="story-heading" class="font-display text-3xl sm:text-4xl mb-6 leading-tight"></h2>
          <div id="story-paragraphs" class="space-y-4 text-ink-soft leading-relaxed"></div>
        </div>
      </div>
    </section>

    <!-- ===================== MISSION & VISION ===================== -->
    <section class="py-24 px-5 sm:px-8 bg-cream-panel" aria-label="Mission and vision">
      <div class="max-w-5xl mx-auto grid sm:grid-cols-2 gap-6">
        <div id="mission-card" class="reveal glass rounded-2xl p-9"></div>
        <div id="vision-card" class="reveal reveal-delay-1 glass rounded-2xl p-9"></div>
      </div>
    </section>

    <!-- ============================ CHEF ============================ -->
    <section class="py-24 px-5 sm:px-8" aria-labelledby="chef-about-heading">
      <div class="max-w-7xl mx-auto grid lg:grid-cols-[0.85fr_1.15fr] gap-14 items-center">
        <div class="reveal relative rounded-2xl overflow-hidden aspect-[4/5]">
          <img id="chef-about-image" src="" alt="Executive chef portrait" class="w-full h-full object-cover img-skeleton" />
        </div>
        <div class="reveal reveal-delay-1">
          <p id="chef-about-eyebrow" class="font-mono-label text-xs uppercase text-terracotta mb-4"></p>
          <h2 id="chef-about-heading" class="font-display text-3xl sm:text-4xl mb-2"></h2>
          <p id="chef-about-role" class="text-ink-soft font-mono-label text-xs uppercase mb-6"></p>
          <div id="chef-about-bio" class="space-y-4 text-ink-soft leading-relaxed mb-7"></div>
          <blockquote id="chef-about-quote" class="border-l-2 border-terracotta pl-5 font-display text-xl italic text-ink"></blockquote>
        </div>
      </div>
    </section>

    <!-- ===================== INTERIOR GALLERY ===================== -->
    <section class="py-24 px-5 sm:px-8 bg-cream-panel" aria-labelledby="interior-gallery-heading">
      <div class="max-w-7xl mx-auto">
        <div class="text-center max-w-2xl mx-auto mb-14 reveal">
          <p class="font-mono-label text-xs uppercase text-terracotta mb-4">The Space</p>
          <h2 id="interior-gallery-heading" class="font-display text-3xl sm:text-4xl">Restaurant Interior</h2>
        </div>
        <div id="interior-gallery-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
      </div>
    </section>

    <!-- ============================ TIMELINE ============================ -->
    <section class="py-24 px-5 sm:px-8" aria-labelledby="timeline-heading">
      <div class="max-w-4xl mx-auto">
        <div class="text-center mb-16 reveal">
          <p class="font-mono-label text-xs uppercase text-terracotta mb-4">A Decade and a Half</p>
          <h2 id="timeline-heading" class="font-display text-3xl sm:text-4xl">Our Journey</h2>
        </div>
        <div id="timeline-list" class="relative border-l border-ink/15 pl-8 space-y-12"></div>
      </div>
    </section>

    <!-- ============================ CTA STRIP ============================ -->
    <section class="py-20 px-5 sm:px-8 text-center bg-cream-panel">
      <div class="reveal">
        <h2 class="font-display text-2xl sm:text-3xl mb-6">Come Taste the Story Yourself</h2>
        <a href="reservation.html" class="btn-primary inline-block px-8 py-3.5 rounded-full font-mono-label text-xs uppercase tracking-widest">Reserve a Table</a>
      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script src="content.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const S = window.SITE;
      const A = S.about;

      document.getElementById("page-hero-bg").src = A.heroImage;
      document.getElementById("page-title").textContent = A.pageTitle;
      document.getElementById("page-subtitle").textContent = A.pageSubtitle;

      /* Story */
      document.getElementById("story-image").src = A.story.image;
      document.getElementById("story-eyebrow").textContent = A.story.eyebrow;
      document.getElementById("story-heading").textContent = A.story.title;
      document.getElementById("story-paragraphs").innerHTML = A.story.paragraphs.map((p) => `<p>${p}</p>`).join("");

      /* Mission / Vision */
      document.getElementById("mission-card").innerHTML = `
        <svg class="w-8 h-8 text-terracotta mb-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2l3 7h7l-5.5 4.5L18.5 21 12 16.5 5.5 21l2-7.5L2 9h7z"/></svg>
        <h3 class="font-display text-2xl mb-3">${A.missionVision.mission.title}</h3>
        <p class="text-ink-soft leading-relaxed">${A.missionVision.mission.body}</p>`;
      document.getElementById("vision-card").innerHTML = `
        <svg class="w-8 h-8 text-terracotta mb-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path stroke-linecap="round" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/></svg>
        <h3 class="font-display text-2xl mb-3">${A.missionVision.vision.title}</h3>
        <p class="text-ink-soft leading-relaxed">${A.missionVision.vision.body}</p>`;

      /* Chef */
      document.getElementById("chef-about-image").src = A.chef.image;
      document.getElementById("chef-about-eyebrow").textContent = A.chef.eyebrow;
      document.getElementById("chef-about-heading").textContent = A.chef.name;
      document.getElementById("chef-about-role").textContent = A.chef.role;
      document.getElementById("chef-about-bio").innerHTML = A.chef.bio.map((p) => `<p>${p}</p>`).join("");
      document.getElementById("chef-about-quote").textContent = "“" + A.chef.quote + "”";

      /* Interior gallery */
      document.getElementById("interior-gallery-grid").innerHTML = A.gallery
        .map(
          (g, i) => `
        <div class="reveal reveal-delay-${(i % 4) + 1} gallery-item rounded-xl overflow-hidden aspect-[4/3]">
          <img src="${g.image}" alt="${g.alt}" class="w-full h-full object-cover img-skeleton" loading="lazy" />
        </div>`
        )
        .join("");

      /* Timeline */
      document.getElementById("timeline-list").innerHTML = A.timeline
        .map(
          (t, i) => `
        <div class="reveal reveal-delay-${(i % 4) + 1} relative">
          <span class="absolute -left-[42px] top-0 w-5 h-5 rounded-full bg-terracotta border-4 border-cream"></span>
          <p class="font-mono-label text-terracotta text-sm mb-1">${t.year}</p>
          <h3 class="font-display text-xl mb-2">${t.title}</h3>
          <p class="text-ink-soft leading-relaxed">${t.body}</p>
        </div>`
        )
        .join("");

      window.SiteApp.setupScrollReveal();
    });
  </script>
</body>
</html>
