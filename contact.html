<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Sitara Family Restaurant</title>
  <meta name="description" content="Get in touch with Sitara Family Restaurant in Bidar — address, phone, email, and a contact form for questions and private dining hall bookings." />
  <meta name="keywords" content="Sitara Family Restaurant contact, Sitara Family Restaurant address Bidar, Sitara Family Restaurant phone number" />
  <link rel="canonical" href="contact.html" />
  <link rel="icon" href="https://picsum.photos/seed/sitaralogo/64/64" type="image/png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#fdf6ea', 'cream-panel': '#fbeedb', maroon: '#5c1a1b', 'maroon-soft': '#7a2b28',
            terracotta: '#c1502e', 'terracotta-deep': '#a23f23', gold: '#d4a24c', ink: '#2b1b12', 'ink-soft': '#5a463a',
          },
          fontFamily: {
            display: ['Fraunces', 'serif'], body: ['Work Sans', 'sans-serif'], mono: ['DM Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-cream text-ink font-body antialiased">

  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:bg-terracotta focus:text-cream focus:px-4 focus:py-2 focus:rounded-full z-[100]">Skip to main content</a>

  <header id="site-header"></header>

  <main id="main-content">

    <section class="relative h-[42vh] min-h-[320px] w-full overflow-hidden flex items-center justify-center text-center" aria-label="Contact page hero">
      <img id="page-hero-bg" src="" alt="Restaurant entrance at dusk" class="absolute inset-0 w-full h-full object-cover img-skeleton" />
      <div class="absolute inset-0 bg-gradient-to-b from-ink/75 via-ink/55 to-cream"></div>
      <div class="relative z-10 px-6">
        <p class="font-mono-label text-xs uppercase text-terracotta mb-4 reveal">Get in Touch</p>
        <h1 id="page-title" class="font-display text-cream text-4xl sm:text-6xl mb-4 reveal reveal-delay-1"></h1>
        <p id="page-subtitle" class="text-cream/85 max-w-lg mx-auto reveal reveal-delay-2"></p>
      </div>
    </section>

    <section class="py-20 px-5 sm:px-8" aria-label="Contact details and form">
      <div class="max-w-6xl mx-auto grid lg:grid-cols-[1fr_1.2fr] gap-12">

        <!-- Details panel -->
        <div class="reveal space-y-6">
          <div class="glass rounded-2xl p-7">
            <h2 class="font-display text-xl mb-5">Visit Us</h2>
            <div class="space-y-5 text-sm text-ink-soft">
              <div class="flex gap-3">
                <svg class="w-5 h-5 text-terracotta shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21s-7-7.2-7-12a7 7 0 1114 0c0 4.8-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
                <p id="contact-address"></p>
              </div>
              <div class="flex gap-3">
                <svg class="w-5 h-5 text-terracotta shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5c0 9 7 16 16 16l3-5-6-2-2 2c-2-1-4-3-5-5l2-2-2-6z"/></svg>
                <p>
                  <a id="contact-phone" href="#" class="hover:text-terracotta"></a>
                  <span id="contact-phone2-wrap"> / <a id="contact-phone2" href="#" class="hover:text-terracotta"></a></span>
                </p>
              </div>
              <div class="flex gap-3">
                <svg class="w-5 h-5 text-terracotta shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <a id="contact-email" href="#" class="hover:text-terracotta"></a>
              </div>
              <div id="contact-website-wrap" class="flex gap-3">
                <svg class="w-5 h-5 text-terracotta shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 100-18 9 9 0 000 18zM3.6 9h16.8M3.6 15h16.8M12 3a14 14 0 014 9 14 14 0 01-4 9 14 14 0 01-4-9 14 14 0 014-9z"/></svg>
                <a id="contact-website" href="#" target="_blank" rel="noopener" class="hover:text-terracotta"></a>
              </div>
            </div>
          </div>

          <div class="glass rounded-2xl p-7">
            <h2 class="font-display text-xl mb-5">Opening Hours</h2>
            <ul id="contact-hours" class="space-y-3 text-sm text-ink-soft"></ul>
          </div>

          <div class="glass rounded-2xl p-7">
            <h2 class="font-display text-xl mb-5">Follow Us</h2>
            <div id="contact-socials" class="flex gap-3"></div>
          </div>
        </div>

        <!-- Form + Map -->
        <div class="reveal reveal-delay-1 space-y-8">
          <form id="contact-form" class="glass-dark rounded-2xl p-8 sm:p-10 space-y-6" novalidate>
            <h2 class="font-display text-2xl mb-2">Send Us a Message</h2>
            <div class="grid sm:grid-cols-2 gap-6">
              <div>
                <label for="contact-name" class="block text-xs font-mono-label uppercase text-cream/60 mb-2">Full Name *</label>
                <input id="contact-name" name="name" type="text" required class="input-field w-full rounded-lg px-4 py-3" placeholder="Your name" />
              </div>
              <div>
                <label for="contact-form-email" class="block text-xs font-mono-label uppercase text-cream/60 mb-2">Email *</label>
                <input id="contact-form-email" name="email" type="email" required class="input-field w-full rounded-lg px-4 py-3" placeholder="you@example.com" />
              </div>
            </div>
            <div>
              <label for="contact-subject" class="block text-xs font-mono-label uppercase text-cream/60 mb-2">Subject *</label>
              <input id="contact-subject" name="subject" type="text" required class="input-field w-full rounded-lg px-4 py-3" placeholder="What's this about?" />
            </div>
            <div>
              <label for="contact-message" class="block text-xs font-mono-label uppercase text-cream/60 mb-2">Message *</label>
              <textarea id="contact-message" name="message" rows="4" required class="input-field w-full rounded-lg px-4 py-3 resize-none" placeholder="Tell us a bit more..."></textarea>
            </div>
            <button type="submit" class="btn-primary w-full sm:w-auto px-10 py-3.5 rounded-full font-mono-label text-xs uppercase tracking-widest">Send Message</button>
            <p id="contact-success" class="hidden text-gold text-sm font-mono-label" role="status" aria-live="polite"></p>
          </form>

          <div class="rounded-2xl overflow-hidden border border-ink/10 aspect-[16/9]">
            <iframe
              id="contact-map"
              src=""
              title="Map showing Sitara Family Restaurant location"
              class="w-full h-full"
              style="border:0;"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script src="content.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const S = window.SITE;
      const C = S.contact;

      document.getElementById("page-hero-bg").src = C.heroImage;
      document.getElementById("page-title").textContent = C.pageTitle;
      document.getElementById("page-subtitle").textContent = C.pageSubtitle;

      document.getElementById("contact-address").textContent = `${C.address.line1}, ${C.address.line2}, ${C.address.country}`;
      const phoneEl = document.getElementById("contact-phone");
      phoneEl.textContent = C.phone;
      phoneEl.href = "tel:" + C.phone.replace(/\s+/g, "");
      const phone2Wrap = document.getElementById("contact-phone2-wrap");
      if (C.phone2) {
        const phone2El = document.getElementById("contact-phone2");
        phone2El.textContent = C.phone2;
        phone2El.href = "tel:" + C.phone2.replace(/\s+/g, "");
      } else {
        phone2Wrap.classList.add("hidden");
      }
      const emailEl = document.getElementById("contact-email");
      emailEl.textContent = C.email;
      emailEl.href = "mailto:" + C.email;
      const websiteWrap = document.getElementById("contact-website-wrap");
      if (C.website) {
        const websiteEl = document.getElementById("contact-website");
        websiteEl.textContent = C.website;
        websiteEl.href = C.website.startsWith("http") ? C.website : "https://" + C.website;
      } else {
        websiteWrap.classList.add("hidden");
      }

      document.getElementById("contact-hours").innerHTML = C.hours
        .map(
          (h) => `<li class="flex justify-between gap-4"><span class="text-ink-soft">${h.days}</span><span class="font-mono-label">${h.time}</span></li>`
        )
        .join("");

      const SOCIAL_ICONS_LOCAL = {
        instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="w-5 h-5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1"/></svg>',
        facebook: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M13.5 21v-7.5h2.5l.5-3h-3V8.2c0-.9.3-1.5 1.6-1.5h1.5V4.1C15.8 4 14.8 4 13.7 4 11 4 9.5 5.6 9.5 8.4v2.1H7v3h2.5V21h4z"/></svg>',
        x: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M3 3l8 9.5L3.4 21H6l6-7 5 7h4l-8.4-10L20 3h-2.6l-5.4 6.3L7.5 3H3z"/></svg>',
        youtube: '<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M21.6 7.2s-.2-1.5-.8-2.2c-.8-.8-1.6-.8-2-.9C16 4 12 4 12 4h0s-4 0-6.8.1c-.4 0-1.2.1-2 .9-.6.7-.8 2.2-.8 2.2S2.2 9 2.2 10.8v1.4C2.2 14 2.4 15.8 2.4 15.8s.2 1.5.8 2.2c.8.8 1.8.8 2.3.9 1.6.2 6.5.2 6.5.2s4 0 6.8-.1c.4 0 1.2-.1 2-.9.6-.7.8-2.2.8-2.2s.2-1.8.2-3.6v-1.4c0-1.8-.2-3.6-.2-3.6zM9.9 14.6V8.9l5.4 2.9-5.4 2.8z"/></svg>',
      };
      document.getElementById("contact-socials").innerHTML = C.socials
        .map(
          (s) =>
            `<a href="${s.href}" aria-label="${s.platform}" class="w-11 h-11 rounded-full border border-ink/20 flex items-center justify-center text-ink-soft hover:text-terracotta hover:border-terracotta transition-colors">${SOCIAL_ICONS_LOCAL[s.icon] || ""}</a>`
        )
        .join("");

      document.getElementById("contact-map").src = C.mapEmbedUrl;

      const form = document.getElementById("contact-form");
      const successMsg = document.getElementById("contact-success");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }
        successMsg.textContent = "Thanks for reaching out — we'll get back to you within 24 hours.";
        successMsg.classList.remove("hidden");
        form.reset();
      });
    });
  </script>
</body>
</html>
