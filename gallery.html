<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Sitara Family Restaurant</title>
  <meta name="description" content="Browse photos of the Sitara Family Restaurant dining room, tandoor kitchen, plated dishes and private dining hall in Bidar." />
  <meta name="keywords" content="Sitara Family Restaurant gallery, restaurant interior Bidar, food photography Bidar" />
  <link rel="canonical" href="gallery.html" />
  <link rel="icon" href="https://picsum.photos/seed/sitaralogo/64/64" type="image/png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#fdf6ea', 'cream-panel': '#fbeedb', maroon: '#5c1a1b', 'maroon-soft': '#7a2b28',
            terracotta: '#c1502e', 'terracotta-deep': '#a23f23', gold: '#d4a24c', ink: '#2b1b12', 'ink-soft': '#5a463a',
          },
          fontFamily: {
            display: ['Fraunces', 'serif'], body: ['Work Sans', 'sans-serif'], mono: ['DM Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-cream text-ink font-body antialiased">

  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:bg-terracotta focus:text-cream focus:px-4 focus:py-2 focus:rounded-full z-[100]">Skip to main content</a>

  <header id="site-header"></header>

  <main id="main-content">

    <section class="relative h-[50vh] min-h-[380px] w-full overflow-hidden flex items-center justify-center text-center" aria-label="Gallery page hero">
      <img id="page-hero-bg" src="" alt="Collage preview of the restaurant gallery" class="absolute inset-0 w-full h-full object-cover img-skeleton" />
      <div class="absolute inset-0 bg-gradient-to-b from-ink/75 via-ink/55 to-cream"></div>
      <div class="relative z-10 px-6">
        <p class="font-mono-label text-xs uppercase text-terracotta mb-4 reveal">In Pictures</p>
        <h1 id="page-title" class="font-display text-cream text-4xl sm:text-6xl mb-4 reveal reveal-delay-1"></h1>
        <p id="page-subtitle" class="text-cream/85 max-w-lg mx-auto reveal reveal-delay-2"></p>
      </div>
    </section>

    <section class="py-10 px-5 sm:px-8 sticky top-[64px] z-30 bg-cream/95 backdrop-blur-md border-b border-ink/10" aria-label="Gallery filters">
      <div id="gallery-filters" class="max-w-7xl mx-auto flex flex-wrap gap-3 justify-center"></div>
    </section>

    <section class="py-16 px-5 sm:px-8" aria-label="Photo gallery">
      <div id="masonry-grid" class="max-w-7xl mx-auto columns-2 sm:columns-3 lg:columns-4 gap-4"></div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <!-- ============================ LIGHTBOX ============================ -->
  <div id="lightbox" class="hidden-lightbox fixed inset-0 z-[100] flex items-center justify-center bg-ink/95 p-4 sm:p-10" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button id="lightbox-close" aria-label="Close image viewer" class="absolute top-5 right-5 sm:top-8 sm:right-8 text-cream w-11 h-11 rounded-full border border-cream/30 flex items-center justify-center hover:border-gold hover:text-gold z-10">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <button id="lightbox-prev" aria-label="Previous image" class="absolute left-3 sm:left-8 top-1/2 -translate-y-1/2 text-cream w-11 h-11 rounded-full border border-cream/30 flex items-center justify-center hover:border-gold hover:text-gold">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button id="lightbox-next" aria-label="Next image" class="absolute right-3 sm:right-8 top-1/2 -translate-y-1/2 text-cream w-11 h-11 rounded-full border border-cream/30 flex items-center justify-center hover:border-gold hover:text-gold">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6"/></svg>
    </button>
    <figure class="max-w-4xl w-full">
      <img id="lightbox-image" src="" alt="" class="w-full max-h-[78vh] object-contain rounded-lg" />
      <figcaption id="lightbox-caption" class="text-center text-cream/60 text-sm mt-4 font-mono-label uppercase tracking-widest"></figcaption>
    </figure>
  </div>

  <script src="content.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const S = window.SITE;
      const G = S.galleryPage;

      document.getElementById("page-hero-bg").src = G.heroImage;
      document.getElementById("page-title").textContent = G.pageTitle;
      document.getElementById("page-subtitle").textContent = G.pageSubtitle;

      const filtersWrap = document.getElementById("gallery-filters");
      const grid = document.getElementById("masonry-grid");
      let activeFilter = "all";
      let visibleItems = [];
      let lightboxIndex = 0;

      function renderFilters() {
        filtersWrap.innerHTML = G.filters
          .map(
            (f) => `
          <button data-filter="${f.id}" class="gallery-filter px-5 py-2.5 rounded-full font-mono-label text-xs uppercase tracking-widest border transition-colors ${
            f.id === activeFilter
              ? "bg-terracotta text-cream border-terracotta"
              : "border-ink/20 text-ink-soft hover:border-terracotta hover:text-terracotta"
          }">${f.label}</button>`
          )
          .join("");
        filtersWrap.querySelectorAll(".gallery-filter").forEach((btn) =>
          btn.addEventListener("click", () => {
            activeFilter = btn.getAttribute("data-filter");
            renderFilters();
            renderGrid();
          })
        );
      }

      function renderGrid() {
        visibleItems = activeFilter === "all" ? G.images : G.images.filter((img) => img.category === activeFilter);
        grid.innerHTML = visibleItems
          .map(
            (img, i) => `
          <div class="reveal reveal-delay-${(i % 4) + 1} gallery-item rounded-xl overflow-hidden break-inside-avoid mb-4" data-index="${i}" tabindex="0" role="button" aria-label="View larger image: ${img.alt}">
            <img src="${img.image}" alt="${img.alt}" class="w-full h-auto object-cover img-skeleton" loading="lazy" />
          </div>`
          )
          .join("");

        grid.querySelectorAll(".gallery-item").forEach((el) => {
          el.addEventListener("click", () => openLightbox(parseInt(el.getAttribute("data-index"), 10)));
          el.addEventListener("keypress", (e) => {
            if (e.key === "Enter") openLightbox(parseInt(el.getAttribute("data-index"), 10));
          });
        });

        window.SiteApp.setupScrollReveal();
      }

      /* ---- Lightbox ---- */
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-image");
      const lightboxCaption = document.getElementById("lightbox-caption");

      function openLightbox(index) {
        lightboxIndex = index;
        updateLightbox();
        lightbox.classList.remove("hidden-lightbox");
        document.body.classList.add("overflow-hidden");
      }
      function closeLightbox() {
        lightbox.classList.add("hidden-lightbox");
        document.body.classList.remove("overflow-hidden");
      }
      function updateLightbox() {
        const item = visibleItems[lightboxIndex];
        lightboxImg.src = item.image;
        lightboxImg.alt = item.alt;
        lightboxCaption.textContent = item.alt;
      }
      function nextImage() {
        lightboxIndex = (lightboxIndex + 1) % visibleItems.length;
        updateLightbox();
      }
      function prevImage() {
        lightboxIndex = (lightboxIndex - 1 + visibleItems.length) % visibleItems.length;
        updateLightbox();
      }

      document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
      document.getElementById("lightbox-next").addEventListener("click", nextImage);
      document.getElementById("lightbox-prev").addEventListener("click", prevImage);
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener("keydown", (e) => {
        if (lightbox.classList.contains("hidden-lightbox")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
      });

      renderFilters();
      renderGrid();
    });
  </script>
</body>
</html>
