<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu | Sitara Family Restaurant</title>
  <meta name="description" content="Explore the Sitara Family Restaurant menu — soups, noodles, veg. starters, veg. curries, Andhra specials, tandoori and fried rice, in Bidar, Karnataka." />
  <meta name="keywords" content="Sitara Family Restaurant menu, multi-cuisine menu Bidar, tandoori menu Bidar, Chinese menu Bidar" />
  <link rel="canonical" href="menu.html" />
  <link rel="icon" href="https://picsum.photos/seed/sitaralogo/64/64" type="image/png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#fdf6ea', 'cream-panel': '#fbeedb', maroon: '#5c1a1b', 'maroon-soft': '#7a2b28',
            terracotta: '#c1502e', 'terracotta-deep': '#a23f23', gold: '#d4a24c', ink: '#2b1b12', 'ink-soft': '#5a463a',
          },
          fontFamily: {
            display: ['Fraunces', 'serif'], body: ['Work Sans', 'sans-serif'], mono: ['DM Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-cream text-ink font-body antialiased">

  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:bg-terracotta focus:text-cream focus:px-4 focus:py-2 focus:rounded-full z-[100]">Skip to main content</a>

  <header id="site-header"></header>

  <main id="main-content">

    <section class="relative h-[50vh] min-h-[380px] w-full overflow-hidden flex items-center justify-center text-center" aria-label="Menu page hero">
      <img id="page-hero-bg" src="" alt="Spread of signature dishes" class="absolute inset-0 w-full h-full object-cover img-skeleton" />
      <div class="absolute inset-0 bg-gradient-to-b from-ink/75 via-ink/55 to-cream"></div>
      <div class="relative z-10 px-6">
        <p class="font-mono-label text-xs uppercase text-terracotta mb-4 reveal">Bill of Fare</p>
        <h1 id="page-title" class="font-display text-cream text-4xl sm:text-6xl mb-4 reveal reveal-delay-1"></h1>
        <p id="page-subtitle" class="text-cream/85 max-w-lg mx-auto reveal reveal-delay-2"></p>
      </div>
    </section>

    <!-- ============================ MENU TABS ============================ -->
    <section class="sticky top-[64px] z-30 bg-cream/95 backdrop-blur-md border-b border-ink/10 py-4 px-5" aria-label="Menu categories">
      <div id="menu-tabs" class="max-w-7xl mx-auto flex gap-3 overflow-x-auto no-scrollbar"></div>
    </section>

    <!-- ============================ MENU ITEMS ============================ -->
    <section class="py-16 px-5 sm:px-8" aria-label="Menu items">
      <div class="max-w-7xl mx-auto">
        <div class="mb-8 flex flex-wrap items-center gap-3 text-xs font-mono-label uppercase text-ink-soft">
          <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span> Veg</span>
          <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-maroon inline-block"></span> Non-Veg</span>
          <span class="flex items-center gap-1.5"><svg class="w-3.5 h-3.5 text-terracotta" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2c1 3-1 4-1 6.5 0 1.4 1.1 2.5 2.5 2.5 1 0 1.7-.6 2-1.4.9 1.3 1.5 2.9 1.5 4.4 0 3.3-2.7 6-6 6s-6-2.7-6-6c0-4 2.5-6 3-9 .3 1.4 1 2.5 1.5 3.5C9.8 6.5 11 4.5 12 2z"/></svg> Spice Level</span>
        </div>
        <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>
    </section>

    <section class="py-20 px-5 sm:px-8 text-center bg-cream-panel">
      <div class="reveal">
        <h2 class="font-display text-2xl sm:text-3xl mb-6">Hungry Already?</h2>
        <a href="reservation.html" class="btn-primary inline-block px-8 py-3.5 rounded-full font-mono-label text-xs uppercase tracking-widest">Reserve a Table</a>
      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script src="content.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const S = window.SITE;
      const M = S.menu;

      function formatPrice(price) {
        return price === null || price === undefined ? "Ask Staff" : "₹" + price;
      }

      document.getElementById("page-hero-bg").src = M.heroImage;
      document.getElementById("page-title").textContent = M.pageTitle;
      document.getElementById("page-subtitle").textContent = M.pageSubtitle;

      const tabsWrap = document.getElementById("menu-tabs");
      const grid = document.getElementById("menu-grid");
      let activeCategory = "all";

      const allTabs = [{ id: "all", label: "All" }, ...M.categories];

      function renderTabs() {
        tabsWrap.innerHTML = allTabs
          .map(
            (cat) => `
          <button data-cat="${cat.id}" class="menu-tab shrink-0 px-5 py-2.5 rounded-full font-mono-label text-xs uppercase tracking-widest border transition-colors ${
            cat.id === activeCategory
              ? "bg-terracotta text-cream border-terracotta"
              : "border-ink/20 text-ink-soft hover:border-terracotta hover:text-terracotta"
          }">${cat.label}</button>`
          )
          .join("");

        tabsWrap.querySelectorAll(".menu-tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            activeCategory = btn.getAttribute("data-cat");
            renderTabs();
            renderGrid();
          });
        });
      }

      function spiceIcons(level) {
        if (!level) return "";
        return Array.from({ length: level })
          .map(() => `<svg class="w-3.5 h-3.5 text-terracotta inline" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2c1 3-1 4-1 6.5 0 1.4 1.1 2.5 2.5 2.5 1 0 1.7-.6 2-1.4.9 1.3 1.5 2.9 1.5 4.4 0 3.3-2.7 6-6 6s-6-2.7-6-6c0-4 2.5-6 3-9 .3 1.4 1 2.5 1.5 3.5C9.8 6.5 11 4.5 12 2z"/></svg>`)
          .join("");
      }

      function renderGrid() {
        const items = activeCategory === "all" ? M.items : M.items.filter((it) => it.category === activeCategory);
        grid.innerHTML = items
          .map(
            (item, i) => `
          <article class="dish-card reveal reveal-delay-${(i % 4) + 1} bg-cream-panel rounded-2xl overflow-hidden border border-ink/10">
            <div class="relative aspect-[4/3] overflow-hidden">
              <img src="${item.image}" alt="${item.name}" class="dish-image w-full h-full object-cover img-skeleton" loading="lazy" />
              <span class="absolute top-3 left-3 w-3 h-3 rounded-full border-2 border-cream ${item.diet === "veg" ? "bg-green-500" : "bg-maroon"}" title="${item.diet === "veg" ? "Vegetarian" : "Non-Vegetarian"}"></span>
            </div>
            <div class="p-5">
              <div class="flex items-start justify-between gap-2 mb-2">
                <h3 class="font-display text-lg leading-snug">${item.name}</h3>
                <span class="font-mono-label text-terracotta whitespace-nowrap">${formatPrice(item.price)}</span>
              </div>
              <p class="text-ink-soft text-sm leading-relaxed mb-3">${item.description}</p>
              <div class="min-h-[14px]">${spiceIcons(item.spice)}</div>
            </div>
          </article>`
          )
          .join("");
        window.SiteApp.setupScrollReveal();
      }

      renderTabs();
      renderGrid();

      /* Deep-link support: menu.html#biryani opens that tab */
      const hash = window.location.hash.replace("#", "");
      if (hash && allTabs.some((c) => c.id === hash)) {
        activeCategory = hash;
        renderTabs();
        renderGrid();
      }
    });
  </script>

  <style>.no-scrollbar::-webkit-scrollbar{display:none;} .no-scrollbar{scrollbar-width:none;}</style>
</body>
</html>
